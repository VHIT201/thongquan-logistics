stages:
  - build
  - deploy

variables:
  DEPLOY_DIR: "/opt/tms-admin-be"

# Cấu hình Build
build:
  stage: build
  script:
    - dotnet clean -c Release
    - dotnet restore
    - dotnet build -c Release
    - dotnet publish -c Release -o ./publish
  artifacts:
    paths:
      - publish/
    expire_in: 1 hour
  only:
    - release/staging

# Cấu hình Deploy
deploy:
  stage: deploy
  tags:
    - runner-vpd-que
  script:
    # Xóa tiến trình cũ nếu đang chạy
    - pm2 delete tms-admin-be || true
    # Đảm bảo thư mục tồn tại và có quyền ghi
    - mkdir -p $DEPLOY_DIR
    # Copy file từ artifacts sang thư mục đích
    - cp -r ./publish/* $DEPLOY_DIR/
    # Chạy ứng dụng qua PM2 bằng cấu hình có sẵn
    - pm2 start $DEPLOY_DIR/ecosystem.config.js --env production
    # Kiểm tra trạng thái
    - sleep 10
    - pm2 status
  only:
    - release/staging
  tags:
    - runner-vpd-que