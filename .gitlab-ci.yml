stages:
  - build
  - deploy

variables:
  DEPLOY_DIR: "/opt/tms-admin-be"

# Cấu hình Build: Chỉ lưu lại những gì cần thiết để deploy
build:
  stage: build
  tags:
    - runner-vpd-que
  script:
    - corepack enable
    - corepack prepare pnpm@latest --activate
    - pnpm install --frozen-lockfile
    - pnpm run build
  artifacts:
    paths:
      - .next/
      - public/
      - package.json
      - pnpm-lock.yaml
      - ecosystem.config.js
    expire_in: 1 hour
  only:
    - release/staging

# Cấu hình Deploy
deploy:
  stage: deploy
  tags:
    - runner-vpd-que
  script:
    # 1. Dọn dẹp tiến trình cũ
    - pm2 delete logistics-platform || true
    
    # 2. Tạo thư mục và copy artifact
    - mkdir -p $DEPLOY_DIR
    - cp -r ./.next $DEPLOY_DIR/
    - cp -r ./public $DEPLOY_DIR/
    - cp package.json $DEPLOY_DIR/
    - cp pnpm-lock.yaml $DEPLOY_DIR/
    - cp ecosystem.config.js $DEPLOY_DIR/
    
    # 3. Cài đặt lại dependency production trên server
    - cd $DEPLOY_DIR
    - corepack enable
    - corepack prepare pnpm@latest --activate
    - pnpm install --prod --frozen-lockfile
    
    # 4. Khởi động ứng dụng
    - pm2 start ecosystem.config.js --env production
    - pm2 save
    - pm2 status
  only:
    - release/staging