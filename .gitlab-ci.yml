stages:
  - build
  - deploy

variables:
  # 1. Đổi tên thư mục deploy cho đúng
  DEPLOY_DIR: "/opt/logistics-platform"

build:
  stage: build
  tags:
    - runner-vpd-que
  script:
    - corepack enable
    - corepack prepare pnpm@latest --activate
    - pnpm install --frozen-lockfile
    - pnpm run build
  artifacts:
    paths:
      - .next/
      - public/
      - package.json
      - pnpm-lock.yaml
      - ecosystem.config.js
    expire_in: 1 hour
  only:
    - release/staging

deploy:
  stage: deploy
  tags:
    - runner-vpd-que
  script:
    # 1. Dọn dẹp tiến trình cũ
    - pm2 delete logistics-platform || true
    
    # 2. Đảm bảo quyền sở hữu thư mục (Nếu bạn chạy Runner với quyền sudo, bỏ qua dòng này)
    # Nếu bị lỗi permission, hãy đảm bảo user gitlab-runner có quyền ghi vào /opt
    - sudo mkdir -p $DEPLOY_DIR
    - sudo chown -R $USER:$USER $DEPLOY_DIR
    
    # 3. Copy artifact vào thư mục
    - cp -r ./.next $DEPLOY_DIR/
    - cp -r ./public $DEPLOY_DIR/
    - cp package.json $DEPLOY_DIR/
    - cp pnpm-lock.yaml $DEPLOY_DIR/
    - cp ecosystem.config.js $DEPLOY_DIR/
    
    # 4. Cài đặt dependency và chạy
    - cd $DEPLOY_DIR
    - corepack enable
    - corepack prepare pnpm@latest --activate
    - pnpm install --prod --frozen-lockfile
    
    # 5. Khởi động ứng dụng
    - pm2 start ecosystem.config.js --env production
    - pm2 save
    - pm2 status
  only:
    - release/staging